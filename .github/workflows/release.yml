name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: make all

      - name: Verify binary
        run: |
          file bin/tg5040/localsend
          # Must say: ELF 64-bit LSB executable, ARM aarch64, statically linked

      - name: Package
        run: make package

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LocalSend.pak.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
